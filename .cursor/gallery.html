        <h1>Rio de Janeiro Photo Gallery</h1>
        <p class="intro">Experience the visual beauty of Rio through these stunning images that capture the city's energy, landscapes, and culture.</p>

        <section class="gallery">
            <figure class="gallery-item">
                <img src="https://as1.ftcdn.net/v2/jpg/01/43/88/56/1000_F_143885651_AVvJmsKrWn3NRPtdLJ0VTn3JBGfNpB7p.jpg" alt="Golden sunset over Ipanema Beach">
                <figcaption>Sunset at Ipanema Beach - One of the most beautiful beaches in the world glows golden as the sun sets over the Atlantic Ocean</figcaption>
            </figure>

            <figure class="gallery-item">
                <img src="https://static.wixstatic.com/media/0a8f4f_2dae877674cd4f75a40ba88ced727d8b~mv2.png/v1/fill/w_1000,h_666,al_c,q_90,usm_0.66_1.00_0.01/0a8f4f_2dae877674cd4f75a40ba88ced727d8b~mv2.png" alt="Colorful mosaic tiles on Escadaria Selarón">
                <figcaption>Escadaria Selarón - The iconic 215-step staircase covered in vibrant tiles from over 60 countries, a masterpiece by artist Jorge Selarón</figcaption>
            </figure>

            <figure class="gallery-item">
                <img src="https://images.fineartamerica.com/images/artworkimages/mediumlarge/2/view-from-sugarloaf-mountain-rio-de-vitor-marigo.jpg" alt="Aerial view from Sugarloaf Mountain">
                <figcaption>View from Sugarloaf Mountain - Breathtaking panoramic views of Guanabara Bay, the city skyline, and surrounding mountains</figcaption>
            </figure>

            <figure class="gallery-item">
                <img src="https://media.timeout.com/images/106063846/image.jpg">
                <figcaption>Lapa Arches at Night - The historic 18th-century aqueduct illuminated against the night sky, heart of Rio's nightlife district</figcaption>
            </figure>

            <figure class="gallery-item">
                <img src="https://riomemorias.com.br/wp-content/uploads/2024/11/Calcada-de-Copacabana.-Foto-Donatas-Dabravolskas-CC-BY-SA-4.0-via-Wikimedia-Commons-1024x684.jpg" alt="Aerial view of Copacabana Beach and wave pattern sidewalk">
                <figcaption>Copacabana from Above - The famous black and white wave-patterned sidewalk along the 2.5-mile stretch of golden sand beach</figcaption>
            </figure>
